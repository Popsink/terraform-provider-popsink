name: acceptance

# Acceptance tests hit a real data-plane, so they run on a schedule and on
# demand rather than on every push. Provide POPSINK_BASE_URL / POPSINK_TOKEN as
# repository secrets pointing at a staging data-plane you can safely write to.

on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  testacc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ".go-version"
          cache: true

      - name: Run acceptance tests
        run: make testacc
        env:
          TF_ACC: "1"
          POPSINK_BASE_URL: ${{ secrets.POPSINK_BASE_URL }}
          POPSINK_TOKEN: ${{ secrets.POPSINK_TOKEN }}
